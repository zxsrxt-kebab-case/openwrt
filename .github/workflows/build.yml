name: Build OpenWrt for JR6150
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android
          sudo apt-get clean

      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Cache toolchain and tools
        uses: actions/cache@v4
        with:
          path: |
            staging_dir/toolchain-*
            staging_dir/host
            build_dir/toolchain-*
            build_dir/host
            dl
          key: openwrt-mt7620-${{ hashFiles('tools/**', 'toolchain/**') }}
          restore-keys: openwrt-mt7620-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Test device detection
        run: |
          # Проверим что наш блок парсится
          make -C target/linux/ramips/image info 2>&1 | grep -i jr6150 || echo "NOT DETECTED BY IMAGE MAKEFILE"
          
          # Проверим что DTS файл называется правильно
          ls -la target/linux/ramips/dts/mt7620a_netgear_jr6150.dts
          head -5 target/linux/ramips/dts/mt7620a_netgear_jr6150.dts
          
          # Проверим наш блок в mk
          tail -20 target/linux/ramips/image/mt7620.mk
          
          # Проверим что SOC совпадает с именем DTS
          # Формат: <SOC>_<device_name>.dts = mt7620a_netgear_jr6150.dts
          # SOC в mk должен быть mt7620a

      - name: Fix line endings
        run: |
          sed -i 's/\r$//' target/linux/ramips/image/mt7620.mk
          sed -i 's/\r$//' target/linux/ramips/dts/mt7620a_netgear_jr6150.dts

      - name: Generate Configuration
        run: |
          rm -f .config
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_netgear_jr6150=y" >> .config
          make defconfig

      - name: Verify device selected
        run: |
          grep jr6150 .config
          grep DEVICE_netgear_jr6150 .config

      - name: Download packages
        run: make download -j8

      - name: Compile firmware
        run: make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_JR6150_Firmware
          path: bin/targets/ramips/mt7620/
